name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        # We will create requirements.txt soon. Install ruff and pytest anyway.
        pip install ruff pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with ruff
      working-directory: ./backend
      run: |
        ruff check .
    - name: Test with pytest
      working-directory: ./backend
      run: |
        # Only run if tests directory exists
        if [ -d "tests" ]; then pytest; else echo "No tests to run."; fi

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install dependencies
      working-directory: ./frontend
      run: |
        # Only run if package.json exists
        if [ -f package.json ]; then npm ci; else echo "No package.json yet."; fi
    - name: Lint with ESLint
      working-directory: ./frontend
      run: |
        # Only run if package.json exists
        if [ -f package.json ]; then npm run lint || echo "No lint script yet."; else echo "No frontend to lint yet."; fi
